services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mycelia
      POSTGRES_USER: mycelia
      POSTGRES_PASSWORD: mycelia_dev
    ports:
      - "${MYCELIA_POSTGRES_PORT:-5432}:5432"
    volumes:
      - mycelia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mycelia -d mycelia"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  mycelia_postgres_data:
